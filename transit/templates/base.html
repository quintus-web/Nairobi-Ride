<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NairobiRide{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }

        /* Navbar */
        .navbar {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%) !important;
            padding: 14px 0;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }
        .navbar-brand {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #fff !important;
        }
        .navbar-brand span { color: #ffc107; }
        .nav-links a {
            color: rgba(255,255,255,0.75) !important;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            margin-left: 24px;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #ffc107 !important; }

        /* Footer */
        footer {
            background: #1a1a2e;
            color: rgba(255,255,255,0.5);
            padding: 30px 0;
            margin-top: 80px;
            font-size: 0.85rem;
        }
        footer a { color: #ffc107; text-decoration: none; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body style="background:#f5f7fa;">

<nav class="navbar navbar-dark">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="/">🚌 Nairobi<span>Ride</span></a>
        <div class="nav-links d-none d-md-flex">
            <a href="{% url 'home' %}"><i class="fa fa-search me-1"></i>Search Routes</a>
            <a href="{% url 'explore' %}"><i class="fa fa-map me-1"></i>Explore Map</a>
            <a href="{% url 'contribute' %}"><i class="fa fa-plus-circle me-1"></i>Contribute</a>
        </div>
    </div>
</nav>

{% block content %}{% endblock %}

<footer>
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
        <span>© 2025 NairobiRide — Navigate Nairobi Like a Local</span>
        <span>Built with ❤️ for Nairobi commuters</span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
